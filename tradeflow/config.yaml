NOTES:
  1: COUNTRY.list "default" = run only incomplete ones within these 12 AU, BR, CA,
    CN, DE, FR, GB, IN, IT, JP, KR, US
  2: COUNTRY.list "all" = run all (could take hours)
TRADEFLOW: domestic,imports,exports
YEAR: 2020
COUNTRY:
  list: US
NODES:
  exiobase:
    source_python: main.py
    node_id: exiobase
    order: 40
    name: Exiobase Trade Flow
    description: Runs exiobase international tradeflow processing.
    link: exiobase/tradeflow
    python_cmds: python main.py
    output_path: ../../../trade-data/year/[year]/
    output_info: Exiobase trade tables
    folder_size: unknown
    dependencies: '{detected_dependencies}'
    data_sources: Exiobase MRIO
    target_repo: trade-data
  us_bea:
    source_python: us-bea.py
    node_id: us_bea
    order: 45
    parent_node: exiobase
    name: US BEA Trade Flow
    description: Runs exiobase US-BEA tradeflow integration and writes US trade-data
      outputs.
    link: exiobase/tradeflow
    python_cmds: python us-bea.py
    output_path: ../../../trade-data/year/[year]/US/
    output_info: US BEA enhanced trade tables
    folder_size: unknown
    dependencies: '{detected_dependencies}'
    api_keys_required: BEA_API_KEY
    data_sources: Exiobase MRIO,US BEA API,FEDEFL
    target_repo: trade-data
  india:
    source_python: india/main.py
    node_id: india
    order: 46
    parent_node: exiobase
    name: India State Allocation
    description: Disaggregates India national statistics to states/UTs and maps Indian GSVA
      activity text and HS products to Exiobase industry_id codes shared with US trade-data
      outputs.
    link: exiobase/tradeflow/india
    python_cmds: python india/main.py
    output_path: ../../../trade-data/year/[year]/IN/domestic/
    output_info: India state matrices; india_us_exiobase crosswalk; aligns industry_id with US MRIO
    folder_size: unknown
    dependencies: '{detected_dependencies}'
    data_sources: India MOSPI GSDP/GSVA, TradeStat HS, India SUT, HS_EXIOBASE_mapping
    target_repo: trade-data
FOLDERS:
  base: ../../trade-data/year/{year}
  imports: ../../trade-data/year/{year}/{country}/imports
  exports: ../../trade-data/year/{year}/{country}/exports
  domestic: ../../trade-data/year/{year}/{country}/domestic
FILES:
  factors: factor.csv
  industries: industry.csv
  industryflow: trade.csv
  trade_factor: trade_factor.csv
  trade_factor_domestic: trade_factor_lg.csv
  interstate_factor: interstate_factor.csv
  interstate_factor_lg: interstate_factor_lg.csv
  trade_impact: trade_impact.csv
  trade_resource: trade_resource.csv
  trade_material: trade_material.csv
  trade_employment: trade_employment.csv
PROCESSING:
  sample_size: 1000
  min_impact_threshold: 0.001
  use_partial_factors: true
  partial_factor_limit: 120
  use_partial_factors_domestic: false
  partial_factor_limit_domestic: 2000
  partial_factor_limit_interstate: 50
  use_partial_factors_interstate: true
